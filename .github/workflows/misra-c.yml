name: MISRA C Compliance

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  misra-c:
    name: MISRA C (cppcheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: c-lean-libp2p
          submodules: recursive

      - name: Install cppcheck from source
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libpcre3-dev
          cd /tmp
          git clone --depth 1 --branch 2.17.1 https://github.com/danmar/cppcheck.git cppcheck-src
          cd cppcheck-src
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DHAVE_RULES=ON
          cmake --build build --parallel
          sudo cmake --install build
          cppcheck --version

      - name: Validate MISRA addon catches real violations
        run: |
          set -euo pipefail
          cat > /tmp/misra_test.c <<'EOF'
          int x = 010;
          #include <stdio.h>
          void f(void) { printf("hello"); }
          EOF

          echo "Testing MISRA addon with known-bad code..."
          if cppcheck --addon=misra --enable=all --error-exitcode=0 /tmp/misra_test.c 2>&1 | grep -i "misra"; then
            echo "MISRA addon is working."
          else
            echo "ERROR: MISRA addon did not detect known violations."
            exit 1
          fi

      - name: Configure
        run: |
          cmake -S c-lean-libp2p -B c-lean-libp2p/build/misra \
            -DBUILD_TESTING=OFF \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build c-lean-libp2p/build/misra --parallel

      - name: Run MISRA C analysis
        run: |
          set -euo pipefail

          cppcheck \
            --addon=misra \
            --enable=all \
            --std=c11 \
            --project=c-lean-libp2p/build/misra/compile_commands.json \
            --include=c-lean-libp2p/tools/cppcheck/misra_external_api.h \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=unmatchedSuppression \
            --suppress='*:*external/*' \
            --suppress='misra-c2012-8.7' \
            -i c-lean-libp2p/external \
            -i c-lean-libp2p/tests \
            -i c-lean-libp2p/bench \
            -i c-lean-libp2p/fuzz \
            -i c-lean-libp2p/formal \
            2>&1 | tee misra-c-report.txt

          misra_count=$(grep -cE 'c-lean-libp2p/src/.*\[misra-c2012-|c-lean-libp2p/include/.*\[misra-c2012-' misra-c-report.txt || true)
          echo ""
          echo "=== MISRA C Summary ==="
          echo "MISRA findings in project code: ${misra_count}"
          if [ "$misra_count" -gt 0 ]; then
            echo "MISRA C violations found."
            grep -E 'c-lean-libp2p/src/.*\[misra-c2012-|c-lean-libp2p/include/.*\[misra-c2012-' misra-c-report.txt
            exit 1
          fi
          echo "No MISRA C violations in project code."

      - name: Upload MISRA C report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: misra-c-report
          path: misra-c-report.txt
