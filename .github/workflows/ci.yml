name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: c-lean-libp2p

      - name: Configure
        run: cmake -S c-lean-libp2p -B c-lean-libp2p/build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build c-lean-libp2p/build --config Debug

      - name: Build (non-Windows)
        if: runner.os != 'Windows'
        run: cmake --build c-lean-libp2p/build --parallel

      - name: Test unit suite (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir c-lean-libp2p/build -C Debug --output-on-failure --tests-regex '^unit_'

      - name: Test unit suite (non-Windows)
        if: runner.os != 'Windows'
        run: ctest --test-dir c-lean-libp2p/build --output-on-failure --tests-regex '^unit_'

  build-and-test-32bit:
    name: build-and-test-32bit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: c-lean-libp2p

      - name: Install 32-bit toolchain
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc-multilib g++-multilib

      - name: Configure (32-bit)
        run: |
          cmake -S c-lean-libp2p -B c-lean-libp2p/build-32 \
            -DCMAKE_C_FLAGS='-m32' \
            -DCMAKE_EXE_LINKER_FLAGS='-m32' \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build c-lean-libp2p/build-32 --parallel

      - name: Test unit suite
        run: ctest --test-dir c-lean-libp2p/build-32 --output-on-failure --tests-regex '^unit_'

  sanitizers:
    name: sanitizers (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: c-lean-libp2p

      - name: Install clang
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Configure with sanitizers
        env:
          CC: clang
        run: |
          cmake -S c-lean-libp2p -B c-lean-libp2p/build-sanitizers \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_C_FLAGS='-fsanitize=address,undefined -fno-omit-frame-pointer' \
            -DCMAKE_EXE_LINKER_FLAGS='-fsanitize=address,undefined'

      - name: Build
        run: cmake --build c-lean-libp2p/build-sanitizers --parallel

      - name: Test unit suite
        env:
          ASAN_OPTIONS: detect_leaks=0
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: ctest --test-dir c-lean-libp2p/build-sanitizers --output-on-failure --tests-regex '^unit_'

  static-analysis:
    name: static-analysis (clang-tidy + cppcheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: c-lean-libp2p

      - name: Install analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy cppcheck

      - name: Configure
        run: |
          cmake -S c-lean-libp2p -B c-lean-libp2p/build-analysis \
            -DBUILD_TESTING=OFF \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build c-lean-libp2p/build-analysis --parallel

      - name: Run clang-tidy
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t c_files < <(find c-lean-libp2p/src -type f -name '*.c' | sort)
          if [ ${#c_files[@]} -eq 0 ]; then
            echo "No C source files found under c-lean-libp2p/src."
            exit 1
          fi

          clang-tidy \
            -p c-lean-libp2p/build-analysis \
            --header-filter='^.*/c-lean-libp2p/include/.*' \
            --warnings-as-errors='*' \
            "${c_files[@]}"

      - name: Run cppcheck
        run: |
          set -euo pipefail
          cppcheck \
            --enable=warning,style,performance,portability \
            --std=c11 \
            --project=c-lean-libp2p/build-analysis/compile_commands.json \
            --suppress=missingIncludeSystem \
            --error-exitcode=1 \
            -i c-lean-libp2p/external \
            -i c-lean-libp2p/tests \
            -i c-lean-libp2p/bench \
            -i c-lean-libp2p/fuzz \
            -i c-lean-libp2p/formal
